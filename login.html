<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FitHub</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo"><img src="assets/logo.png" alt="" srcset=""></div>
            <ul class="navList hideOnMobile">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
            <div class="loginReg hideOnMobile">
                <a href="register.html"><button>Register</button></a>
            </div>
            <div class="theme hideOnMobile">
                <img src="assets/moon.svg" class="themeDark">
            </div>
            <div class="dropMenuBars hideOnScreen">
                <img src="assets/menu.svg" alt="" id="dropMenuIcon">
            </div>
        </nav>
        <div class="dropDown">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Blog</a></li>
            <a href="register.html" class="dropDownBtn"><button>Register</button></a>

            <div>
                <img src="assets/moon.svg" class="themeDark">
            </div>
        </div>
    </header>

    <main>
        <div class="mainContentBox">
            <p>Welcome Back</p>
            <div class="loginForm">
                <input type="email" name="" id="" placeholder="Enter Email">
                <input type="password" placeholder="Enter Password">
            </div>
            <div class="registerHere">
                <p>Don't have an account, <a href="register.html"><span>Register Here</span></a></p>
            </div>
            <div class="signin">
                <button type="submit">Sign in</button>
            </div>
            <div class="seperation">
                <div class="line"></div>
                <p>or continue with</p>
                <div class="line"></div>
            </div>
            <div class="loginOptions">
                <img src="assets/socials/GoogleBox.svg" alt="">
                <img src="assets/socials/AppleBox.svg" alt="">
                <img src="assets/socials/FacebookBox.svg" alt="">
            </div>

        </div>

    </main>
    <script src="login.js"></script>
</body>

</html>
