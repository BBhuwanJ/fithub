<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/titleIcon.png">
    <title>FitHub | Journey to your wellness.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo"><img src="images/logo.png" alt="" srcset=""></div>
            <ul class="navList hideOnMobile">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
            <div class="loginReg hideOnMobile">
                <button>LogIn</button>
                <button>Register</button>
            </div>
            <div class="theme hideOnMobile">
                <img src="images/moon.svg" class="themeDark">
            </div>
            <div class="dropMenuBars hideOnScreen">
                <img src="images/menu.svg" alt="" id="dropMenuIcon">
            </div>
        </nav>
        <div class="dropDown">
            <li><a href="#">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Blog</a></li>
            <button>LogIn</button>
            <button>Register</button>
            <div>
                <img src="images/moon.svg" class="themeDark">
            </div>
        </div>
    </header>
    <main>
        <div class="mainContainer">
            <div class="mainContentBox">
                <div class="mainContent">
                    <p>One Stop Solution</p>
                    <p>for your wellness.</p>
                    <button class="getStarted">Get Started</button>
                </div>
            </div>
            <div class="mainPicture">
                <img src="images/mainPicture.png" alt="">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
